- name: "controlPlane_authentication_mechanism_test.yml"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "controlPlane_authentication_mechanism_test"
    nisd_uuid: 7467890a-2299-11f1-9fc3-ebb3b3f1fb90
    client_id: 743f08ae-6b00-11f1-bb16-e7f7f153e6d3
    parent: None

  tasks:
    - block:
        # check for the app_type
        - name: "{{ recipe_name }}: Check if the app_type is 'controlplane'."
          vars:
            app_type: "{{ app_type }}"
          debug:
            msg: "app_type is: {{ app_type }}"
          failed_when: (app_type != "controlplane")

        - name: "{{ recipe_name }}: Start PMDB cluster and fetch membership"
          include_role:
            name: common
            tasks_from: start_pmdb_and_get_membership.yml

        - name: "{{ recipe_name }}: create nisd device"
          vars:
            img_dir: "/s3DV_nisd.device"
            bs: "64M"
            count: 160
          debug:
            msg:
              - "{{ lookup('helper', 'create_dd_file', img_dir, bs, count) }}"
          register: nisd_dev_path

        - name: "{{ recipe_name }}: Print the device path."
          debug: 
            msg: "{{ nisd_dev_path.msg[0] }}"

        - name: Get NIOVA_BIN_PATH
          set_fact:
            niova_bin_path: "{{ lookup('env', 'NIOVA_BIN_PATH') }}"

        - name: "{{ recipe_name }}: Run controlplane Go test to create entity hierarchy."
          vars:
            input_param:
              test_path: "{{ niova_bin_path }}/ctlplane_test"
              test_name: "TestCreateHierarchyForUserAuthentication"
              output_file: "go_test_output"
          set_fact:
            gotest_result: "{{ lookup('controlplane', 'gotest', input_param) }}"

        - name: "{{ recipe_name }}: Print go test result."
          debug:
            msg: "{{ gotest_result }}"

        - name: "{{ recipe_name }}: Verify all Go tests passed."
          vars:
            failed_tests: "{{ gotest_result.parsed_results.failed }}"
          debug:
            msg: "Number of failed tests: {{ failed_tests }}"
          failed_when: (failed_tests | int) > 0

        - name: "{{ recipe_name }}: Run controlplane Go test to create vdev."
          vars:
            input_param:
              test_path: "{{ niova_bin_path }}/ctlplane_test"
              test_name: "TestUserAuthVdevCreation"
              output_file: "go_test_output_1"
          set_fact:
            gotest_result_1: "{{ lookup('controlplane', 'gotest', input_param) }}"

        - name: "{{ recipe_name }}: Print go test 1 result."
          debug:
            msg: "{{ gotest_result_1 }}"

        - name: "{{ recipe_name }}: Verify all Go tests passed."
          vars:
            failed_tests: "{{ gotest_result_1.parsed_results.failed }}"
          debug:
            msg: "Number of failed tests: {{ failed_tests }}"
          failed_when: (failed_tests | int) > 0

        - name: "{{ recipe_name }}: Extract username"
          set_fact:
            user1_name: >-
              {{
                (gotest_result_1.parsed_results.tests[0].info_messages
                | select('search','Created user')
                | first).split(': ')[1].split(' with')[0]
              }}

        - name: "{{ recipe_name }}: Print username"
          debug:
            msg: "{{ user1_name }}"

        - name: "{{ recipe_name }}: Extract user secret value"
          set_fact:
            user1_secret: >-
              {{
                (gotest_result_1.parsed_results.tests[0].info_messages
                | select('search','Secret key')
                | first).split(': ')[1]
              }}

        - name: "{{ recipe_name }}: Print user secret"
          debug:
            msg: "{{ user1_secret }}"

        - name: "{{ recipe_name }}: Extract vdev id"
          set_fact:
            vdev_id: >-
              {{
                (gotest_result_1.parsed_results.tests[0].info_messages
                | select('search','accessed their vdev')
                | first).split(': ')[1]
              }}

        - name: "{{ recipe_name }}: Print vdev id"
          debug:
            msg: "{{ vdev_id }}"

        - name: "{{ recipe_name }}: Extract username2"
          set_fact:
            user2_name: >-
              {{
                (gotest_result_1.parsed_results.tests[0].info_messages
                | select('search','Created user2')
                | first).split(': ')[1].split(' with')[0]
              }}

        - name: "{{ recipe_name }}: Print username"
          debug:
            msg: "{{ user2_name }}"

        - name: "{{ recipe_name }}: Extract user2 secret value"
          set_fact:
            user2_secret: >-
              {{
                (gotest_result_1.parsed_results.tests[0].info_messages
                | select('search','Secret key of user2')
                | first).split(': ')[1]
              }}

        - name: "{{ recipe_name }}: Print user2 secret"
          debug:
            msg: "{{ user2_secret }}"

        - name: "{{ recipe_name }}: Start niova-block-ctl process."
          vars:
            input_param: {
              'nisd_device_path': '{{ nisd_dev_path.msg[0] }}',
              'nisd_uuid': '{{ nisd_uuid }}',
            }
          debug:
            msg: "{{ lookup('nisd_handler', 'run-niova-block-ctl', input_param) }}"
    
        - name: "{{ recipe_name }}: Start nisd"
          vars:
            input_param: {
              'nisd_device_path': '{{ nisd_dev_path.msg[0] }}',
              'nisd_uuid': '{{ nisd_uuid }}',
              'peer_port': '13000',
              'client_port': '13001',
              'enable_auth': 1,
            }
          debug:
            msg:
              - "{{ lookup('nisd_handler', 'run_nisd', input_param) }}"

        # Pause for 2 seconds for NISD to start successfully
        - pause: seconds=2

        - name: "{{ recipe_name}}: Wait until nisd_root_entry gets updated"
          vars:
            stage: "wait_for_nisd_root_entry"
            lookout_uuid: ""
          debug:
            msg:
              - "Waiting for nisd to get updated"
              - "{{ lookup('niova_ctlrequest', 'lookup', nisd_uuid, '/nisd_root_entry/0/status', 'nisd', lookout_uuid) }}"
          no_log: false
          until: lookup('niova_ctlrequest', 'lookup', nisd_uuid, '/nisd_root_entry/0/status', 'nisd', lookout_uuid)['/0/status'] == "running"
          retries: 10
          delay: 1

        - name: "{{ recipe_name }}: Start niova-block-test process."
          vars:
            input_param: {
                 'enable_auth': 1,
                 'cp_mode': 1,
                 'auth_username': '{{ user1_name }}',
                 'auth_secret': '{{ user1_secret }}',
                 'nisd_uuid_to_write' : 'unix:{{ nisd_uuid }}',
                 'vdev' : '{{ vdev_id }}',
                 'client_uuid': '{{ client_id }}',
                 'rd_op_ratio': '0',
                 'num_ops': '50',
                 'random_seed_pt': '123',
                 'request_size_in_bytes': '1',
                 'queue_depth' : '0',
                 'integrity_check': False,
                 'sequential_writes': False,
                 'blocking_process': False
            }
          set_fact:
            nblock_wr: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"

        - name: Validate niova-block-test return code
          debug:
            msg: "Process failed with return code {{ nblock_wr }}"
          failed_when: nblock_wr | int != 0

      rescue:
        - name: "Recipe: {{ recipe_name }} failed"
          set_fact:
            terminate_recipe: true  