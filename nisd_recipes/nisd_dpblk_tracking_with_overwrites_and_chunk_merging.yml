- import_playbook: nisd_initialization_and_startup.yml
- name: "nisd_dpblk_tracking_with_overwrites_and_chunk_merging"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "nisd_dpblk_tracking_with_overwrites"
    parent: "nisd_initialization_and_startup"
    nisd_root_keys:
              - "/nisd_root_entry/0/uuid"
              - "/nisd_root_entry/0/instance-uuid"
              - "/nisd_root_entry/0/status"
              - "/nisd_root_entry/0/num-reserved-pblks"
              - "/nisd_root_entry/0/num-pblks"
              - "/nisd_root_entry/0/num-pblks-used"
              - "/nisd_root_entry/0/vblks-written"
              - "/nisd_root_entry/0/vblks-written"
              - "/nisd_root_entry/0/num-pblks-used"
              - "/nisd_root_entry/0/num-reserved-pblks-used"
    nisd_chunk_keys:
              - "/nisd_chunks/0/vdev-uuid"
              - "/nisd_chunks/0/number"
              - "/nisd_chunks/0/num-data-pblks"
              - "/nisd_chunks/0/num-meta-pblks"
              - "/nisd_chunks/0/num-reserved-meta-pblks"
              - "/nisd_chunks/0/metablock-seqno"
              - "/nisd_chunks/0/read-op-seqno"
              - "/nisd_chunks/0/merge-read-op-seqno"
              - "/nisd_root_entry/0/vblks-written"
              - "/nisd_chunks/0/vblks-read"
              - "/nisd_chunks/0/num-cme"
              - "/nisd_chunks/0/ref-cnt"
              - "/nisd_chunks/0/merge-info/shallow-cnt"
              - "/nisd_chunks/0/merge-info/shallow-status"

  tasks:
  - block:
     - name: "Check if parent recipe failed"
       debug: msg="Check if parent recipe {{ parent }} failed"
       failed_when: terminate_recipe == true

     #1 - Capture the /nisd_root_entry Values left by the parent
     - name: "{{ recipe_name }}: Capture the /nisd_root_entry Values left by the parent."
       vars:
         stage: "initial_value"
         lookout_uuid: "{{ get_lookout[0] }}"
         origVal: "{{ lookup('niova_ctlrequest', 'lookup', item, nisd_root_keys, 'nisd', lookout_uuid) }}"
       set_fact:
         initialValues: >-
            {{
              initialValues | default([]) +
              [{
                'nisd_uuid': item,
                'entry': origVal
              }]
            }}
       loop: "{{ get_nisd }}"

     - debug:
         msg: "{{ initialValues }}"

     - name: "{{ recipe_name }}: Reset VdevUUIDS list."
       set_fact:
         VdevUUIDS: []

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     # Get multiple vdev uuids using common task.
     - name: "Get multiple vdev uuids."
       include_role:
        name: common
        tasks_from: get_multiple_vdev_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     # Get multiple client uuids using common task.
     - name: "Get multiple client uuids."
       include_role:
        name: common
        tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     #2 - Perform a Number of Single Block Writes to the NISD
     - name: "{{ recipe_name }}: Perform some Writes to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write': 'unix:{{ get_nisd[item] }}',
                 'vdev': '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio': '0',
                 'random_seed_pt': '987',
                 'client_uuid': '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes': '1',
                 'queue_depth': '1',
                 'num_ops': '512',
                 'integrity_check': True,
                 'sequential_writes': False,
                 'blocking_process': False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         write_success: "{{ (write_success | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
    
     - name: "{{ recipe_name }}: Show write results."
       debug:
         msg: "Read results: {{ write_success }}"

     - name: "{{ recipe_name }}: Fail if any write failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ write_success }}"
       failed_when: (write_success | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after writes."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after writes."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     #3 - Issue a Merge on the Chunk
     - name: "{{ recipe_name}}: Wait until 'chunk-merge-status' : 'idle'"
       vars:
         stage: "wait_for_nisd_chunk"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkInfo[item].chunk_index }}"
       debug:
         msg: "Waiting for nisd to get updated"
       until: lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-status', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == "idle"
       retries: 10
       delay: 1
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Capture the value of “chunk-merge-cnt”."
       vars:
         stage: "orig_chunk_merge_cnt"
         getChunkCnt: "{{ ChunkInfo[item].chunk_info['merge-info/shallow-cnt'] }}"
       set_fact:
         origChunkCnt: >-
           {{
             origChunkCnt | default([]) +
              [{
                'nisd_uuid': get_nisd[item],
                'entry': getChunkCnt
              }]
           }}
       loop: "{{ range(0, get_nisd | length) | list }}"

     - debug:
         msg: "{{ origChunkCnt }}"

     - name: "{{ recipe_name }}: Issue chunk merge cmd."
       vars:
         stage: "chunkMerge"
         cmd: "shallow-status@merge"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: false

     - name: "{{ recipe_name}}: Wait until chunk cnt gets updated."
       vars:
         orig_merge_cnt: "{{ origChunkCnt[item].entry['/merge-info/shallow-cnt'] }}"
         stage: "wait_for_chunk_cnt"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkInfo[item].chunk_index }}"
       debug:
         msg: 
          - "Waiting for nisd to get updated"
          - "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-cnt', 'nisd', lookout_uuid) }}"
       until: lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-cnt', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == ((orig_merge_cnt | int) + 1)
       retries: 10
       delay: 1
       loop: "{{ range(0, get_nisd | length) | list }}"

     #4 - Verify Chunk Values.
     - name: "{{ recipe_name }}: Verify nisd chunk values."
       vars:
         stage: "verify_nisd_chunk"
         getNiovaBlockTest: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify nisd values after writes: {{ getNiovaBlockTest }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: false
       failed_when: >
         (getNiovaBlockTest['merge-info/shallow-status'] != "idle") or
         (getNiovaBlockTest['vblks-written'] != 512) or
         (getNiovaBlockTest['metablock-seqno'] != 511) or
         (getNiovaBlockTest['ref-cnt'] != 1) or
         (getNiovaBlockTest['num-data-pblks'] != 16) or
         (getNiovaBlockTest['num-meta-pblks'] != 1) or
         (getNiovaBlockTest['num-reserved-meta-pblks'] != 1)

     # 5 - Verify /nisd_root_entry Values against those taken in Step #1
     - name: "{{ recipe_name }}: Verify /nisd_root_entry Values against those taken in Step #1."
       vars:
         stage: "verify_nisd_root_keys"
         old_num_block_used: "{{ initialValues[item].entry['/0/num-pblks-used'] }}"
         old_num_reserved_block_used: "{{ initialValues[item].entry['/0/num-reserved-pblks-used'] }}"
         lookout_uuid: "{{ get_lookout[0] }}"
         getNiovaBlockTest: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_root_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify nisd values after writes: {{ getNiovaBlockTest }}, {{ old_num_block_used }}, {{ old_num_reserved_block_used }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: false
       failed_when: >
         (getNiovaBlockTest['/0/num-pblks-used'] != ((old_num_block_used | int) + 17)) or
         (getNiovaBlockTest['/0/num-reserved-pblks-used'] != ((old_num_reserved_block_used | int) + 1))

     #6 - Issue a Read of the Vblks
     - name: "{{ recipe_name }}: Issue a Read of the Vblks."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '987',
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '512',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
          read_success: "{{ (read_success | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show read results."
       debug:
         msg: "Read results: {{ read_success }}"

     - name: "{{ recipe_name }}: Fail if any read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ read_success }}"
       failed_when: (read_success | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Store the old client list for later step."
       set_fact:
         OldClientUUIDS: "{{ ClientUUIDS | default([]) }}"

     - debug:
         msg: "OldClientUUIDS: {{ OldClientUUIDS }}"

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     - debug:
         msg: "Reset ClientUUIDS: {{ ClientUUIDS }}"

     # Get multiple client uuids using common task.
     - name: "Get multiple client uuids."
       include_role:
        name: common
        tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     - debug:
         msg: "New ClientUUIDS: {{ ClientUUIDS }}"

     # 7 - Overwrite the Vblks Using a New CLIENT_UUID
     - name: "{{ recipe_name }}: Overwrite the Vblks Using a New CLIENT_UUID."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt' : '987',
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '512',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
          overwr_success: "{{ (overwr_success | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show overwrite results."
       debug:
         msg: "Overwrite results: {{ overwr_success }}"

     - name: "{{ recipe_name }}: Fail if any writes failed."
       debug:
         msg: "One or more niova-block-test writes failed: {{ overwr_success }}"
       failed_when: (overwr_success | reject('equalto', '0') | list | length) > 0

     #8 - Issue a Read of the Vblks using $CLIENT_UUID
     - name: "{{ recipe_name }}: Issue a Read of the Vblks using old CLIENT_UUID."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '987',
                 'client_uuid' : '{{ OldClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '512',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
          rd_failure: "{{ (rd_failure | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show read failure results."
       debug:
         msg: "Read results: {{ rd_failure }}"

     - name: "{{ recipe_name }}: Verify if all readsfailed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ rd_results }}"
       failed_when: (rd_failure | reject('equalto', '0') | list | length) != 0

     #9 - Issue a Read of the Vblks using $CLIENT_UUID_NEW
     - name: "{{ recipe_name }}: Issue a Read of the Vblks using CLIENT_UUID_NEW."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '987',
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '512',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
          new_rd_success: "{{ (new_rd_success | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show new client read results."
       debug:
         msg: "Read results: {{ new_rd_success }}"

     - name: "{{ recipe_name }}: Fail if any read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ new_rd_success }}"
       failed_when: (new_rd_success | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after pause compaction."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after pause compaction."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Capture the value of “chunk-merge-cnt” after new client reads."
       vars:
         stage: "get_merge_cnt_after_new_rds"
         getChunkCnt: "{{ ChunkInfo[item].chunk_info['merge-info/shallow-cnt'] }}"
       set_fact:
         ChunkCntAftrNewRds: >-
           {{
             ChunkCntAftrNewRds | default([]) +
              [{
                'nisd_uuid': item,
                'entry': getChunkCnt
              }]
           }}
       loop: "{{ range(0, get_nisd | length) | list }}"

     - debug:
         msg: "{{ ChunkCntAftrNewRds }}"

     #10 - Repeat Step #3 - Issue a Merge on the Chunk
     - name: "{{ recipe_name }}: Issue a Merge on the Chunk"
       vars:
         stage: "issueChunkMergeAftrNewRds"
         cmd: "shallow-status@merge"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: true

     - name: "{{ recipe_name}}: Wait until chunk cnt gets updated after issuing merge after new reads."
       vars:
         orig_merge_cnt: "{{ ChunkCntAftrNewRds[item].entry['/merge-info/shallow-cnt'] }}"
         stage: "wait_for_chunk_cnt_after_issuing_merge_after_new_reads"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkInfo[item].chunk_index }}"
       debug:
         msg: "Waiting for nisd to get updated"
       until: lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-cnt', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == ((orig_merge_cnt | int) + 1)
       retries: 10
       delay: 1
       loop: "{{ range(0, get_nisd | length) | list }}"

     #11 - Repeat Step #5 - Verifying pblk counts
     - name: "{{ recipe_name }}: Verify the overwrite of the vblk data should have resulted in no additional pblk allocations."
       vars:
         stage: "verify_pblkCnt"
         old_num_block_used: "{{ initialValues[item].entry['/0/num-pblks-used'] }}"
         old_num_reserved_block_used: "{{ initialValues[item].entry['/0/num-reserved-pblks-used'] }}"
         lookout_uuid: "{{ get_lookout[0] }}"
         getNiovaBlockTest: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_root_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify nisd values after overwrites: {{ getNiovaBlockTest }}, {{ old_num_block_used }}, {{ old_num_reserved_block_used }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: false
       failed_when: >
         (getNiovaBlockTest['/0/num-pblks-used'] != ((old_num_block_used | int) + 17)) or
         (getNiovaBlockTest['/0/num-reserved-pblks-used'] != ((old_num_reserved_block_used | int) + 1))

     #12 - Repeat Step #9 - Verify that the post-merge vblk data are intact
     - name: "{{ recipe_name }}: Verify that the post-merge vblk data are intact."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '987',
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '512',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
          postMerge_rd_results: "{{ (postMerge_rd_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show post merge read results."
       debug:
         msg: "Post merge Read results: {{ postMerge_rd_results }}"

     - name: "{{ recipe_name }}: Fail if any post merge read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ postMerge_rd_results }}"
       failed_when: (postMerge_rd_results | reject('equalto', '0') | list | length) > 0

    rescue:
     - name: "Recipe: {{ recipe_name }} failed"
       set_fact:
         terminate_recipe: true
