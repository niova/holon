- import_playbook: nisd_initialization_and_startup.yml
- name: "nisd_dpblk_tracking_with_overwrites_and_chunk_merging_version2"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "nisd_dpblk_tracking_with_overwrites_v2"
    parent: "nisd_initialization_and_startup"
    nisd_root_keys:
              - "/nisd_root_entry/0/uuid"
              - "/nisd_root_entry/0/instance-uuid"
              - "/nisd_root_entry/0/status"
              - "/nisd_root_entry/0/num-reserved-pblks"
              - "/nisd_root_entry/0/num-pblks"
              - "/nisd_root_entry/0/num-pblks-used"
              - "/nisd_root_entry/0/vblks-written"
              - "/nisd_root_entry/0/num-pblks-used"
              - "/nisd_root_entry/0/num-reserved-pblks-used"
    nisd_chunk_keys:
              - "/nisd_chunks/0/vdev-uuid"
              - "/nisd_chunks/0/number"
              - "/nisd_chunks/0/num-data-pblks"
              - "/nisd_root_entry/0/vblks-written"
              - "/nisd_chunks/0/num-meta-pblks"
              - "/nisd_chunks/0/num-reserved-meta-pblks"
              - "/nisd_chunks/0/metablock-seqno"
              - "/nisd_chunks/0/num-cme"
              - "/nisd_chunks/0/ref-cnt"
              - "/nisd_chunks/0/merge-info/shallow-cnt"
              - "/nisd_chunks/0/merge-info/shallow-status"

  tasks:
  - block:
     - name: "Check if parent recipe failed"
       debug: msg="Check if parent recipe {{ parent }} failed"
       failed_when: terminate_recipe == true

     #1 - Capture the /nisd_root_entry Values left by the parent
     - name: "{{ recipe_name }}: Capture the /nisd_root_entry Values left by the parent."
       vars:
         stage: "initial_value"
         lookout_uuid: "{{ get_lookout[0] }}"
         origVal: "{{ lookup('niova_ctlrequest', 'lookup', item, nisd_root_keys, 'nisd', lookout_uuid) }}"
       set_fact:
         initialValues: >-
            {{
              initialValues | default([]) +
              [{
                'nisd_uuid': item,
                'entry': origVal
              }]
            }}
       loop: "{{ get_nisd }}"

     - name: "{{ recipe_name }}: Reset VdevUUIDS list."
       set_fact:
         VdevUUIDS: []

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     # Get multiple vdev uuids using common task.
     - name: "Get multiple vdev uuids."
       include_role:
        name: common
        tasks_from: get_multiple_vdev_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     # Get multiple client uuids using common task.
     - name: "Get multiple client uuids."
       include_role:
        name: common
        tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     #2 - Perform a Number of Single Block Writes to the NISD
     - name: "{{ recipe_name }}: Perform some Writes to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write': 'unix:{{ get_nisd[item] }}',
                 'vdev': '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt': '1010101',
                 'client_uuid': '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes': '1',
                 'queue_depth': '1',
                 'num_ops': '1000',
                 'integrity_check': True,
                 'sequential_writes': False,
                 'blocking_process': False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         write_success: "{{ (write_success | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Fail if any write failed."
       debug:
         msg: "One or more niova-block-test writes failed: {{ write_success }}"
       failed_when: (write_success | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkIndexes list."
       set_fact:
         ChunkIndexes: []

     - name: "{{ recipe_name }}: Get chunk index for all nisds."
       include_role:
         name: common
         tasks_from: get_chunk_index.yml
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     #3 - Issue a Merge on the Chunk
     - name: "{{ recipe_name}}: Wait until 'chunk-merge-status': 'idle'"
       vars:
         stage: "wait_for_nisd_chunk"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkIndexes[item] }}"
       debug:
         msg: "Waiting for nisd to get 'idle'"
       until: lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-status', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == "idle"
       retries: 10
       delay: 1
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Capture the value of “chunk-merge-cnt”."
       vars:
         stage: "chunk_merge_cnt"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkIndexes[item] }}"
         getChunkCnt: "{{ lookup('niova_ctlrequest', 'lookup', item, '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-cnt', 'nisd', lookout_uuid) }}"
       set_fact:
         origChunkCnt: >-
           {{
             origChunkCnt | default([]) +
             [{
               'nisd_uuid': get_nisd[item],
               'entry': getChunkCnt
             }]
           }}
       loop: "{{ range(0, get_nisd | length) | list }}"

     - debug:
         msg: "{{ origChunkCnt }}"   

     - name: "{{ recipe_name }}: Issue chunk merge cmd."
       vars:
         stage: "chunkMerge"
         cmd: "shallow-status@merge"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: false

     - name: "{{ recipe_name}}: Wait until chunk cnt gets updated."
       vars:
         orig_merge_cnt: "{{ origChunkCnt[item].entry['/merge-info/shallow-cnt'] }}"
         stage: "wait_for_chunk_cnt"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkIndexes[item] }}"
       debug:
         msg: "Waiting for chunk-cnt to get updated"
       until: lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/merge-info/shallow-cnt', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == ((orig_merge_cnt | int) + 1)
       retries: 20
       delay: 1
       loop: "{{ range(0, get_nisd | length) | list }}"

     #4 - Verify Chunk Values.
     - name: "{{ recipe_name }}: Verify nisd chunk values."
       vars:
         stage: "verify_nisd_chunk"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkIndexes[item] }}"
         nisd_keys:
              - "/nisd_chunks/{{ chunk_index }}/num-data-pblks"
              - "/nisd_chunks/{{ chunk_index }}/num-meta-pblks"
              - "/nisd_chunks/{{ chunk_index }}/num-reserved-meta-pblks"
              - "/nisd_chunks/{{ chunk_index }}/metablock-seqno"
              - "/nisd_root_entry/0/vblks-written"
              - "/nisd_chunks/{{ chunk_index }}/ref-cnt"
              - "/nisd_chunks/{{ chunk_index }}/merge-info/shallow-status"
         getNiovaBlockTest: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify nisd values after writes: {{ getNiovaBlockTest }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"
       failed_when: >
         (getNiovaBlockTest['/' ~ chunk_index ~ '/merge-info/full-status'] != "idle") or
         (getNiovaBlockTest['/0/vblks-written'] != 1000) or
         (getNiovaBlockTest['/' ~ chunk_index ~ '/metablock-seqno'] != 999) or
         (getNiovaBlockTest['/' ~ chunk_index ~ '/ref-cnt'] != 1) or
         (getNiovaBlockTest['/' ~ chunk_index ~ '/num-data-pblks'] != 32) or
         (getNiovaBlockTest['/' ~ chunk_index ~ '/num-meta-pblks'] != 1) or
         (getNiovaBlockTest['/' ~ chunk_index ~ '/num-reserved-meta-pblks'] != 1)

     #4a - Capture num-data-pblks
     - name: "{{ recipe_name }}: Capture num-data-pblks."
       vars:
         stage: "verify_nisd_chunk"
         lookout_uuid: "{{ get_lookout[0] }}"
         chunk_index: "{{ ChunkIndexes[item] }}"
         getNumDataPblks: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/num-data-pblks', 'nisd', lookout_uuid) }}"
       set_fact:
         origNumDataPblk: >-
           {{
             origNumDataPblk | default([]) +
             [{
               'nisd_uuid': get_nisd[item],
               'entry': getNumDataPblks
             }]
           }}
       loop: "{{ get_nisd }}"

     - debug:
         msg: "{{ origNumDataPblk }}"

     #5 - Verify /nisd_root_entry Values against those taken in Step #1
     - name: "{{ recipe_name }}: Verify /nisd_root_entry Values against those taken in Step #1."
       vars:
         stage: "verify_nisd_root_keys"
         old_num_block_used: "{{ initialValues[item].entry['/0/num-pblks-used'] }}"
         old_num_reserved_block_used: "{{ initialValues[item].entry['/0/num-reserved-pblks-used'] }}"
         lookout_uuid: "{{ get_lookout[0] }}"
         getNiovaBlockTest: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_root_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify /nisd_root_entry values: {{ getNiovaBlockTest }}, {{ old_num_block_used }}, {{ old_num_reserved_block_used }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"
       failed_when: >
         (getNiovaBlockTest['/0/num-pblks-used'] != ((old_num_block_used | int) + 33)) or
         (getNiovaBlockTest['/0/num-reserved-pblks-used'] != ((old_num_reserved_block_used | int) + 1))

      #6 - Issue a Read of the Vblks
     - name: "{{ recipe_name }}: Issue a Read of the Vblks."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write': 'unix:{{ get_nisd[item] }}',
                 'vdev': '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio': '100',
                 'random_seed_pt': '1010101',
                 'client_uuid': '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes': '1',
                 'queue_depth': '1',
                 'num_ops': '1000',
                 'integrity_check': True,
                 'sequential_writes': False,
                 'blocking_process': False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         read_success: "{{ (read_success | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Fail if any read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ read_success }}"
       failed_when: (read_success | reject('equalto', '0') | list | length) > 0

     #7a - Overwrite the Vblks Using varying Queue Depths and Verifying the VBLKs after Each Iteration.
     - name: "{{ recipe_name }}: Overwrite the Vblks Using varying Queue Depths and Verifying the VBLKs after Each Iteration."
       include_role:
         name: common
         tasks_from: overwrite_and_verify_vblk_written
       vars:
        NisdUUID: "{{ get_nisd[overwrite_case.0] }}"
        VdevUUID: "{{ VdevUUIDS[overwrite_case.0] }}"
        ClientUUID: "{{ ClientUUIDS[overwrite_case.0] }}"
        LookoutUUID: "{{ get_lookout[0] }}"
        RequestVblk: 1
        item: "{{ overwrite_case.1 }}"
       loop: "{{ range(0, get_nisd | length) | product([2, 7, 17, 32, 63, 128, 255]) | list }}"
       loop_control:
         loop_var: overwrite_case

     #7b - Read the Vblks Using varying Queue Depths
     - name: "{{ recipe_name }}: Perform Read to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[read_case.0] }}',
                 'vdev' : '{{ VdevUUIDS[read_case.0] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '1010101',
                 'client_uuid' : '{{ ClientUUIDS[read_case.0] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '{{ read_case.1 | string }}',
                 'num_ops' : '1000',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       debug:
         msg: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"
       loop: "{{ range(0, get_nisd | length) | product([2, 7, 17, 32, 63, 128, 255]) | list }}"
       loop_control:
         loop_var: read_case

     - name: "{{ recipe_name }}: Issue chunk merge cmd."
       vars:
         stage: "chunkMerge"
         cmd: "shallow-status@merge"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       loop: "{{ range(0, get_nisd | length) | list }}"
       no_log: false

     - name: "{{ recipe_name }}: Verify num-data-pblks is equal to the original value captured in Step #4."
       vars:
         chunk_index: "{{ ChunkIndexes[item] }}"
         old_value: "{{ origNumDataPblk[item].entry['/' ~ chunk_index ~ '/num-data-pblks'] }}"
         stage: "verify_numDataPblk"
         lookout_uuid: "{{ get_lookout[0] }}"
         verifyNumDataPblks: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/nisd_chunks/{{ chunk_index }}/num-data-pblks', 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify num-data-pblks is equal to the original value: {{ verifyNumDataPblks }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"
       failed_when: >
         (verifyNumDataPblks['/' ~ chunk_index ~ '/num-data-pblks'] != (old_value | int))

     #7e - Re-Read the Vblks Using varying Queue Depths.
     - name: "{{ recipe_name }}: Perform Read to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[read_case.0] }}',
                 'vdev' : '{{ VdevUUIDS[read_case.0] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '1010101',
                 'client_uuid' : '{{ ClientUUIDS[read_case.0] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '{{ read_case.1 | string }}',
                 'num_ops' : '1000',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       debug:
         msg: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"
       loop: "{{ range(0, get_nisd | length) | product([2, 7, 17, 32, 63, 128, 255]) | list }}"
       loop_control:
         loop_var: read_case

     #8 - (Re)Verify /nisd_root_entry Values against those taken in Step #1
     - name: "{{ recipe_name }}: (Re)Verify /nisd_root_entry Values against those taken in Step #1."
       vars:
         stage: "verify_nisd_root_keys"
         old_num_block_used: "{{ initialValues[item].entry['/0/num-pblks-used'] }}"
         old_num_reserved_block_used: "{{ initialValues[item].entry['/0/num-reserved-pblks-used'] }}"
         lookout_uuid: "{{ get_lookout[0] }}"
         reVerifyRootEntry: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_root_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Re-verify /nisd_root_entry values: {{ reVerifyRootEntry }}, {{ old_num_block_used }}, {{ old_num_reserved_block_used }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"
       failed_when: >
         (reVerifyRootEntry['/0/num-pblks-used'] != ((old_num_block_used | int) + 33)) or
         (reVerifyRootEntry['/0/num-reserved-pblks-used'] != ((old_num_reserved_block_used | int) + 1))

    rescue:
     - name: "Recipe: {{ recipe_name }} failed"
       set_fact:
         terminate_recipe: true

