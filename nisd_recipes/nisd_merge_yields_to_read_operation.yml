- import_playbook: nisd_initialization_and_startup.yml

- name: "nisd_merge_yields_to_read_operation"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "nisd_merge_yields_to_read_operation"
    parent: "nisd_initialization_and_startup"
    num_of_remaining: 4
    no_of_ops: 85

  tasks:
  - block:
     - name: "Check if parent recipe failed"
       debug: msg="Check if parent recipe {{ parent }} failed"
       failed_when: terminate_recipe == true

     - name: "{{ recipe_name }}: Reset VdevUUIDS list."
       set_fact:
         VdevUUIDS: []

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     # Get multiple vdev uuids using common task.
     - name: "Get multiple vdev uuids."
       include_role:
        name: common
        tasks_from: get_multiple_vdev_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     # Get multiple client uuids using common task.
     - name: "Get multiple client uuids."
       include_role:
        name: common
        tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     #1 - Perform Writes to a new Chunk/Fill Entire Reserved Pblk
     - name: "{{ recipe_name }}: Perform some Writes to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '32',
                 'queue_depth' : '1',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : False,
                 'sequential_writes' : True,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         write_results: "{{ (write_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show write results."
       debug:
         msg: "Write results: {{ write_results }}"

     - name: "{{ recipe_name }}: Fail if any write failed."
       debug:
         msg: "One or more niova-block-test writes failed: {{ write_results }}"
       failed_when: (write_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after writes."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after writes."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Get nisd_chunk info after writes."
       vars:
         stage: "verifyAftrWr"
         chunk_info_after_write: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify nisd values after writes: {{ chunk_info_after_write }}"
       no_log: True
       failed_when: >
         (chunk_info_after_write['/vblks-written'] != (no_of_ops | int) * 32) or
         (chunk_info_after_write['/metablock-seqno'] != ((no_of_ops | int) - 1)) or
         (chunk_info_after_write['/merge-info/shallow-cnt'] != 0) or
         (chunk_info_after_write['/num-meta-pblks'] != 0) or
         (chunk_info_after_write['/num-data-pblks'] != (no_of_ops | int)) or
         (chunk_info_after_write['/num-reserved-meta-pblks'] != 1)
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Capture values after 1st set of writes."
       vars:
         stage: "verify_nisd_chunk"
         chunk_info_after_write: "{{ ChunkInfo[item].chunk_info }}"
       set_fact:
         origValues: >-
           {{
             origValues | default([]) +
             [{'nisd_uuid': get_nisd[item], 'entry': chunk_info_after_write}]
           }}
       no_log: True
       loop: "{{ range(0, get_nisd | length) | list }}"

     #2 - Apply the Fault Injection “read_preempts_merge”
     - name: "{{ recipe_name }}: Apply the Fault Injection “read_preempts_merge”"
       include_role:
         name: common
         tasks_from: apply_fi_on_nisd
       vars:
         numRemaining: "{{ num_of_remaining }}"
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
         fault_injection_name: "read_preempts_merge"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

     - name: "{{ recipe_name }}: Apply the Fault Injection “read_preempts_merge”."
       include_role:
         name: common
         tasks_from: enable_fi_on_nisd
       vars:
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
         fault_injection_name: "read_preempts_merge"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

     #3 -  Launch Reads (num_remaining - 1)
     - name: "{{ recipe_name }}: Launch Reads (num_remaining - 1)."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '32',
                 'queue_depth' : '3',
                 'num_ops' : '3',
                 'integrity_check' : False,
                 'sequential_writes' : False,
                 'blocking_process' : True,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       debug:
         msg: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name}}: Wait until 'conns' gets updated"
       vars:
         stage: "wait_for_conns"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "Waiting for 'conns' to get updated"
       until: lookup('niova_ctlrequest', 'lookup', get_nisd[item], '/conns/0/num-pending', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == 3
       retries: 60
       delay: 2
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after read."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after read."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify tasks and nisd_chunk."
       vars:
         stage: "verfyAftrRd"
         chunk_info_after_read: "{{ ChunkInfo[item].chunk_info }}"
         lookout_uuid: "{{ get_lookout[0] }}"
         nisd_keys:
              - "/conns/0/num-pending"
              - "/conns/0/vblks-pending"
         aftrRdConns: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify nisd values after read: {{ aftrRdNisdChunk }}"
       no_log: false
       failed_when: >
         (chunk_info_after_read['vblks-read'] != 0) or
         (aftrRdNisdChunk['/0/num-pending'] != 3) or
         (aftrRdNisdChunk['/0/vblks-pending'] != 96)
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "Verify wait-fault-injection task."
       include_role:
         name: common
         tasks_from: verify_nisd_task_wait_fault_injection
       vars:
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

     #4 - Pause Compaction on the Chunk
     - name: "{{ recipe_name }}: Pause Compaction on the Chunk."
       vars:
         stage: "chunkPause"
         cmd: "shallow-status@pause"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after pause compaction."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after pause compaction."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify after pause compaction."
       vars:
         stage: "verifyAftrPause"
         chunk_info_after_pause: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify after pause compaction: {{ chunk_info_after_pause }}"
       no_log: false
       failed_when: >
         (chunk_info_after_pause['merge-info/shallow-status'] != "paused")
       loop: "{{ range(0, get_nisd | length) | list }}"

     #5 - Overwrite the VBLKS from Step #1 using a new CLIENT_UUID
     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     - name: "Get multiple client uuids."
       include_role:
        name: common
        tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Overwrite the VBLKS from Step #1 using a new CLIENT_UUID."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '32',
                 'queue_depth' : '1',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : False,
                 'sequential_writes' : True,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         overwrite_results: "{{ (overwrite_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show overwrite results."
       debug:
         msg: "Overwrite results: {{ overwrite_results }}"

     - name: "{{ recipe_name }}: Fail if any overwrite failed."
       debug:
         msg: "One or more niova-block-test overwrites failed: {{ overwrite_results }}"
       failed_when: (overwrite_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after second set of writes."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after second set of writes."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify after overwrite."
       vars:
         stage: "verfyAftr2ndWr"
         old_values: "{{ origValues[item].entry }}"
         lookout_uuid: "{{ get_lookout[0] }}"
         aftrWr: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify compaction has NOT occurred: {{ aftrWr }}"
       no_log: false
       failed_when: >
         (aftrWr['vblks-written'] != ((old_values['vblks-written'] | int) * 2)) or
         (aftrWr['num-reserved-meta-pblks'] != ((old_values['num-reserved-meta-pblks'] | int) + 1)) or
         (aftrWr['merge-info/shallow-status'] != "paused")
       loop: "{{ range(0, get_nisd | length) | list }}"

     #6 - Resume and Force Compaction
     - name: "{{ recipe_name }}: Resume Compaction."
       vars:
         stage: "chunkResume"
         cmd: "shallow-status@resume"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Force Compaction."
       vars:
         stage: "chunkForce"
         cmd: "shallow-status@merge"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after unpause compaction."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after unpause compaction."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify after unpause compaction."
       vars:
         stage: "aftrForceCompaction"
         aftrForceCompct: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify after pause compaction: {{ aftrForceCompct }}"
       no_log: false
       failed_when: >
         (aftrForceCompct['num-meta-pblks'] != 1) or
         (aftrForceCompct['num-reserved-meta-pblks'] != 2) or
         (aftrForceCompct['num-data-pblks'] != ((no_of_ops | int) * 2)) or
         (aftrForceCompct['merge-info/shallow-status'] != "merging") or
         (aftrForceCompct['merge-info/shallow-cnt'] != 1) or
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "Verify wait-merge-preempted task."
       include_role:
         name: common
         tasks_from: verify_wait_merge_preempted
       vars:
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

     #7 - Enqueue Reads from the Client Used in Step #5
     - name: "{{ recipe_name }}: Enqueue Reads from the Client Used in Step #5"
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '32',
                 'queue_depth' : '1',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : False,
                 'sequential_writes' : False,
                 'blocking_process' : True,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       debug:
         msg: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after read."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after read."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify nisd_chunks Checks after read."
       vars:
         stage: "aftrRead"
         old_values: "{{ origValues[item].entry }}"
         aftrRead: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify nisd_chunks Checks: {{ aftrRead }}"
       no_log: false
       failed_when: >
         (aftrRead['vblks-read'] != 2816) or
         (aftrRead['vblks-written'] != ((old_values['vblks-written'] | int) * 2)) or
         (aftrRead['num-data-pblks'] != (no_of_ops | int)) or
         (aftrRead['num-meta-pblks'] != 1) or
         (aftrRead['num-reserved-meta-pblks'] != 1) or
         (aftrRead['metablock-seqno'] != (((no_of_ops | int) * 2) - 1)) or
         (aftrRead['merge-info/shallow-cnt'] != 1) or
         (aftrRead['merge-info/shallow-status'] != "idle")
       loop: "{{ range(0, get_nisd | length) | list }}"

    rescue:
     - name: "Recipe: {{ recipe_name }} failed"
       set_fact:
         terminate_recipe: true
