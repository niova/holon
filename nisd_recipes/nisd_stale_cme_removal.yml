- import_playbook: nisd_initialization_and_startup.yml
- name: "nisd_stale_cme_removal"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "nisd_stale_cme_removal"
    parent: "nisd_initialization_and_startup"
    no_of_ops: 85

  tasks:
  - block:
     - name: "Check if parent recipe failed"
       debug: msg="Check if parent recipe {{ parent }} failed"
       failed_when: terminate_recipe == true

     - name: "{{ recipe_name }}: Reset VdevUUIDS list."
       set_fact:
         VdevUUIDS: []

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     - name: "Get multiple vdev uuids."
       include_role:
         name: common
         tasks_from: get_multiple_vdev_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "Get multiple client uuids."
       include_role:
         name: common
         tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     #1 - Perform Writes to a new Chunk/Fill Entire Reserved Pblk
     - name: "{{ recipe_name }}: Perform some Writes to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : False,
                 'sequential_writes' : True,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         write_results: "{{ (write_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show write results."
       debug:
         msg: "Write results: {{ write_results }}"

     - name: "{{ recipe_name }}: Fail if any write failed."
       debug:
         msg: "One or more niova-block-test writes failed: {{ write_results }}"
       failed_when: (write_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after writes."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after writes."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Get nisd_chunk info after writes."
       vars:
         stage: "verifyAftrWr"
         aftrWrNisdChunk: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify nisd values after writes: {{ aftrWrNisdChunk }}"
       no_log: false
       failed_when: >
         (aftrWrNisdChunk['vblks-written'] != (no_of_ops | int)) or
         (aftrWrNisdChunk['metablock-seqno'] != ((no_of_ops | int) - 1)) or
         (aftrWrNisdChunk['merge-info/shallow-cnt'] != 0) or
         (aftrWrNisdChunk['num-meta-pblks'] != 0) or
         (aftrWrNisdChunk['num-reserved-meta-pblks'] != 1)
       loop: "{{ range(0, get_nisd | length) | list }}"

     #2 - Read the VBLKS which were written in Step #1.
     - name: "{{ recipe_name }}: Issue a Read of the Vblks."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : False,
                 'sequential_writes' : True,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         read_results: "{{ (read_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show read results."
       debug:
         msg: "Read results: {{ read_results }}"

     - name: "{{ recipe_name }}: Fail if any read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ read_results }}"
       failed_when: (read_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after read."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after read."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Get nisd_chunk info after read."
       vars:
         stage: "verfyAftrRd"
         aftrRdNisdChunk: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify nisd values after read: {{ aftrRdNisdChunk }}"
       no_log: false
       failed_when: >
         (aftrRdNisdChunk['vblks-read'] != (no_of_ops | int)) or
         (aftrRdNisdChunk['metablock-seqno'] != ((no_of_ops | int) - 1)) or
         (aftrRdNisdChunk['merge-info/shallow-cnt'] != 0) or
         (aftrRdNisdChunk['num-cme'] != (no_of_ops | int)) or
         (aftrRdNisdChunk['ref-cnt'] != ((no_of_ops | int) + 1))
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Cast all VdevUUIDS elements to string"
       set_fact:
         VdevUUIDS: "{{ VdevUUIDS | map('string') | list }}"

     - name: "{{ recipe_name }}: DEBUG Print type of each vdev uuid."
       debug:
         msg: "Value={{ item }}, Type={{ item | type_debug }}"
       loop: "{{ VdevUUIDS }}"

     #3 - Pause Compaction
     - name: "{{ recipe_name }}: Pause Compaction."
       vars:
         stage: "chunkPause"
         cmd: "shallow-status@pause"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after pause compaction."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after pause compaction."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify after pause compaction."
       vars:
         stage: "verifyAftrPause"
         aftrPause: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify after pause compaction: {{ aftrPause }}"
       no_log: false
       failed_when: >
         (aftrPause['merge-info/shallow-status'] != "paused") or
         (aftrPause['merge-info/shallow-cnt'] != 0)
       loop: "{{ range(0, get_nisd | length) | list }}"

     #4 - Write one more VBLK to the Chunk and Read it Back
     - name: "{{ recipe_name }}: Write one more VBLK to the Chunk."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '1',
                 'integrity_check' : False,
                 'sequential_writes' : True,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         additional_write_results: "{{ (additional_write_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show additional write results."
       debug:
         msg: "Additional write results: {{ additional_write_results }}"

     - name: "{{ recipe_name }}: Fail if any additional write failed."
       debug:
         msg: "One or more niova-block-test writes failed: {{ additional_write_results }}"
       failed_when: (additional_write_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Read back the one VBLK."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : Null,
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '1',
                 'num_ops' : '1',
                 'integrity_check' : False,
                 'sequential_writes' : True,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         additional_read_results: "{{ (additional_read_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show additional read results."
       debug:
         msg: "Additional read results: {{ additional_read_results }}"

     - name: "{{ recipe_name }}: Fail if any additional read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ additional_read_results }}"
       failed_when: (additional_read_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after read."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after read."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     #4a - Ensure that the write and read have occurred and compaction has NOT occurred.
     - name: "{{ recipe_name }}: Ensure that the write and read have occurred and compaction has NOT occurred."
       vars:
         stage: "verfyAftrWrRd"
         aftrWrRd: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify compaction has NOT occurred: {{ aftrWrRd }}"
       no_log: false
       failed_when: >
         (aftrWrRd['vblks-read'] != ((no_of_ops | int) + 1)) or
         (aftrWrRd['vblks-written'] != ((no_of_ops | int) + 1)) or
         (aftrWrRd['num-reserved-meta-pblks'] != 2) or
         (aftrWrRd['metablock-seqno'] != (no_of_ops | int)) or
         (aftrWrRd['merge-info/shallow-cnt'] != 0) or
         (aftrWrRd['merge-info/full-status'] != "paused") or
         (aftrWrRd['num-cme'] != ((no_of_ops | int) + 1)) or
         (aftrWrRd['ref-cnt'] != ((no_of_ops | int) + 2))
       loop: "{{ range(0, get_nisd | length) | list }}"

     #5 - Unpause Compaction
     - name: "{{ recipe_name }}: Resume Compaction."
       vars:
         stage: "chunkResume"
         cmd: "shallow-status@resume"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after unpause compaction."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after unpause compaction."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify after unpause compaction."
       vars:
         stage: "verifyAftrResume"
         aftrResume: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify after pause compaction: {{ aftrResume }}"
       no_log: false
       failed_when: >
         (aftrResume['num-reserved-meta-pblks'] != 2) or
         (aftrResume['metablock-seqno'] != (no_of_ops | int)) or
         (aftrResume['merge-info/shallow-status'] != "idle") or
         (aftrResume['merge-info/shallow-cnt'] != 0) or
         (aftrResume['num-cme'] != ((no_of_ops | int) + 1)) or
         (aftrResume['ref-cnt'] != ((no_of_ops | int) + 2))
       loop: "{{ range(0, get_nisd | length) | list }}"

     #6 - Force Compaction
     - name: "{{ recipe_name }}: Force Compaction."
       vars:
         stage: "chunkForce"
         cmd: "shallow-status@merge"
         where: "/nisd_chunks/vdev-uuid@{{ VdevUUIDS[item] }}/merge-info"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg: "{{ lookup('niova_ctlrequest', 'apply_cmd', get_nisd[item], cmd, where, 'nisd', lookout_uuid) }}"
       no_log: false
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Reset ChunkInfo list after forcing compaction."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after forcing compaction."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify after unpause compaction."
       vars:
         stage: "aftrForceCompaction"
         aftrForceCompct: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify after pause compaction: {{ aftrForceCompct }}"
       no_log: false
       failed_when: >
         (aftrForceCompct['num-meta-pblks'] != 1) or
         (aftrForceCompct['num-reserved-meta-pblks'] != 1) or
         (aftrForceCompct['metablock-seqno'] != (no_of_ops | int)) or
         (aftrForceCompct['merge-info/shallow-status'] != "idle") or
         (aftrForceCompct['merge-info/shallow-cnt'] != 1) or
         (aftrForceCompct['num-cme'] != (no_of_ops | int)) or
         (aftrForceCompct['ref-cnt'] != ((no_of_ops | int) + 1))
       loop: "{{ range(0, get_nisd | length) | list }}"

    rescue:
     - name: "Recipe: {{ recipe_name }} failed"
       set_fact:
         terminate_recipe: true
