- import_playbook: nisd_initialization_and_startup.yml

- name: "nisd_basic_hole_read"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "nisd_basic_hole_read"
    parent: "nisd_initialization_and_startup"
    no_of_ops: 100
    nisd_root_keys:
              - "/nisd_root_entry/0/uuid"
              - "/nisd_root_entry/0/vblks-read"
              - "/nisd_root_entry/0/vblks-hole-read"
              - "/nisd_root_entry/0/status"

  tasks:
  - block:
     - name: "Check if parent recipe failed"
       debug: msg="Check if parent recipe {{ parent }} failed"
       failed_when: terminate_recipe == true

     - name: "{{ recipe_name }}: Kill the nisd process."
       debug:
         msg:  "{{ lookup('niova_raftprocess', 'kill', item) }}"
       no_log: True
       loop: "{{ get_nisd }}"

     - name: "{{ recipe_name }}: Start nisd process."
       vars:
          input_param: {
              'nisd_uuid' : '{{ item }}',
              'uport' : '{{ 1053 + (nisd_idx*2) }}',
              'lookout_uuid': '{{ get_lookout[0] }}'
              }
       debug:
         msg: "{{ lookup('nisd_handler', 'nisd', input_param) }}"
       loop: "{{ get_nisd }}"
       loop_control:
         index_var: nisd_idx
       no_log: false

     - name: "{{ recipe_name}}: Wait until nisd_root_entry gets updated"
       vars:
         stage: "wait_for_nisd_root_entry"
         lookout_uuid: "{{ get_lookout[0] }}"
       debug:
         msg:
          - "Waiting for nisd to get updated"
          - "{{ lookup('niova_ctlrequest', 'lookup', item, '/nisd_root_entry/0/status', 'nisd', lookout_uuid) }}"
       no_log: false
       until: lookup('niova_ctlrequest', 'lookup', item, '/nisd_root_entry/0/status', 'nisd', lookout_uuid) | dict2items | map(attribute='value') | list | first == "running"
       retries: 60
       delay: 1
       loop: "{{ get_nisd }}"

     - name: "{{ recipe_name }}: Verify Initial Conditions."
       vars:
         stage: "afterRestart_nisd_root_entry"
         lookout_uuid: "{{ get_lookout[0] }}"
         nisdRootEntryVal: "{{ lookup('niova_ctlrequest', 'lookup', item, nisd_root_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "verify nisd root entry values for {{ item }}: {{ nisdRootEntryVal }}"
       no_log: false
       failed_when: >
         (nisdRootEntryVal['/0/uuid'] != item) or
         (nisdRootEntryVal['/0/status'] != "running") or
         (nisdRootEntryVal['/0/vblks-hole-read'] != 0)
       loop: "{{ get_nisd }}"

     - name: "{{ recipe_name }}: Reset VdevUUIDS list."
       set_fact:
         VdevUUIDS: []

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     # Get multiple vdev uuids using common task.
     - name: "Get multiple vdev uuids."
       include_role:
        name: common
        tasks_from: get_multiple_vdev_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     # Get multiple client uuids using common task.
     - name: "Get multiple client uuids."
       include_role:
        name: common
        tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     #2 - Read the VBLKS which were written in Step #1.
     - name: "{{ recipe_name }}: Perform a Read of the Previously Written VBLKS."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '100',
                 'random_seed_pt' : '123',
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '32',
                 'queue_depth' : '1',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : False,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
          read_results: "{{ (read_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show read results."
       debug:
         msg: "Read results: {{ read_results }}"

     - name: "{{ recipe_name }}: Fail if any read failed."
       debug:
         msg: "One or more niova-block-test reads failed: {{ read_results }}"
       failed_when: (read_results | reject('equalto', '0') | list | length) > 0

     #2a - Verify Hole Reads
     - name: "{{ recipe_name }}: Verify Hole Reads."
       vars:
         stage: "afterRead_nisd_root_entry"
         lookout_uuid: "{{ get_lookout[0] }}"
         nisdRootEntryVal: "{{ lookup('niova_ctlrequest', 'lookup', item, nisd_root_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "verify nisd root entry values: {{ nisdRootEntryVal }}"
       no_log: false
       failed_when: >
         (nisdRootEntryVal['/0/vblks-read'] != 0) or
         (nisdRootEntryVal['/0/vblks-hole-read'] != 3200)
       loop: "{{ get_nisd }}"

     #2b - Ensure $NEW_VDEV_UUID is NOT Contained in nisd_chunks
     - name: "{{ recipe_name }}: Verify that hole reads did not create a vdev-chunk object."
       vars:
         stage: "afterRead_nisd_chunk"
         nisd_keys:
              - "/nisd_chunks/*/vdev-uuid"
         lookout_uuid: "{{ get_lookout[0] }}"
         nisdChunk: "{{ lookup('niova_ctlrequest', 'lookup', get_nisd[item], nisd_keys, 'nisd', lookout_uuid) }}"
       debug:
         msg: "verify nisd root entry values: {{ nisdChunk }}"
       no_log: false
       failed_when: >
         (nisdChunk['/*/vdev-uuid'] == VdevUUIDS[item])
       loop: "{{ range(0, get_nisd | length) | list }}"

     #2c - Ensure “tasks” items are Idle
     - name: "Verify 'tasks' items are idle."
       include_role:
         name: common
         tasks_from: verify_nisd_tasks_parameters
       vars:
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

    rescue:
     - name: "Recipe: {{ recipe_name }} failed"
       set_fact:
         terminate_recipe: true
