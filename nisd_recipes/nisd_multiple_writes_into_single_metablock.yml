- import_playbook: nisd_initialization_and_startup.yml
- name: "nisd_multiple_writes_into_single_metablock"
  hosts: localhost
  connection: local
  vars:
    recipe_name: "nisd_multiple_writes_into_single_metablock"
    parent: "nisd_initialization_and_startup"
    num_of_remaining: 16
    no_of_ops: 16

  tasks:
  - block:
     - name: "Check if parent recipe failed"
       debug: msg="Check if parent recipe {{ parent }} failed"
       failed_when: terminate_recipe == true

     - name: "{{ recipe_name }}: Apply fault injection on NISD and verify."
       include_role:
         name: common
         tasks_from: apply_fi_on_nisd
       vars:
         numRemaining: "{{ num_of_remaining }}"
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
         fault_injection_name: "metablock_multi_fill"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

     - name: "{{ recipe_name }}: Enable fault injection on NISD and verify."
       include_role:
         name: common
         tasks_from: enable_fi_on_nisd
       vars:
         NisdUUID: "{{ nisd_uuid }}"
         LookoutUUID: "{{ get_lookout[0] }}"
         fault_injection_name: "metablock_multi_fill"
       loop: "{{ get_nisd }}"
       loop_control:
         loop_var: nisd_uuid

     - name: "{{ recipe_name }}: Reset VdevUUIDS list."
       set_fact:
         VdevUUIDS: []

     - name: "{{ recipe_name }}: Reset ClientUUIDS list."
       set_fact:
         ClientUUIDS: []

     - name: "Get multiple vdev uuids."
       include_role:
         name: common
         tasks_from: get_multiple_vdev_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "Get multiple client uuids."
       include_role:
         name: common
         tasks_from: get_multiple_client_uuids
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Perform some Writes to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write' : 'unix:{{ get_nisd[item] }}',
                 'vdev' : '{{ VdevUUIDS[item] }}',
                 'rd_op_ratio' : '0',
                 'random_seed_pt' : '456',
                 'client_uuid' : '{{ ClientUUIDS[item] }}',
                 'request_size_in_bytes' : '1',
                 'queue_depth' : '16',
                 'num_ops' : '{{ no_of_ops | string }}',
                 'integrity_check' : True,
                 'sequential_writes' : False,
                 'blocking_process' : False,
                 'lookout_uuid': '{{ get_lookout[0] }}'
                 }
       set_fact:
         write_results: "{{ (write_results | default([])) + [lookup('nisd_handler', 'niova-block-test', input_param) | string] }}"
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Show write results."
       debug:
         msg: "Write results: {{ write_results }}"

     - name: "{{ recipe_name }}: Fail if any write failed."
       debug:
         msg: "One or more niova-block-test writes failed: {{ write_results }}"
       failed_when: (write_results | reject('equalto', '0') | list | length) > 0

     - name: "{{ recipe_name }}: Reset ChunkInfo list after writes."
       set_fact:
         ChunkInfo: []

     - name: "{{ recipe_name }}: Get chunk info after writes."
       include_role:
         name: common
         tasks_from: get_chunk_info
       loop: "{{ range(0, get_nisd | length) | list }}"
       loop_control:
         loop_var: nisd_idx

     - name: "{{ recipe_name }}: Verify nisd_chunk info after writes."
       vars:
         stage: "verify_nisd_chunk"
         chunk_info_after_write: "{{ ChunkInfo[item].chunk_info }}"
       debug:
         msg: "Verify nisd values after writes for {{ get_nisd[item] }} and vdev {{ VdevUUIDS[item] }}: {{ chunk_info_after_write }}"
       no_log: false
       failed_when: >
         ((chunk_info_after_write['vdev-uuid']) != VdevUUIDS[item]) or
         ((chunk_info_after_write['vblks-written'] | int) != (no_of_ops | int)) or
         ((chunk_info_after_write['metablock-seqno'] | int) != (no_of_ops | int) - 1) or
         ((chunk_info_after_write['num-data-pblks'] | int) != 1) or
         ((chunk_info_after_write['num-reserved-meta-pblks'] | int) != 1)
       loop: "{{ range(0, get_nisd | length) | list }}"

     - name: "{{ recipe_name }}: Verify fault-injection values."
       vars:
         stage: "get_fi"
         fi_key:
            - "/fault_injection_points"
         lookout_uuid: "{{ get_lookout[0] }}"
         get_fi: "{{ lookup('niova_ctlrequest', 'lookup', item, fi_key, 'nisd', lookout_uuid) }}"
         verifyFI: "{{ get_fi['//fault_injection_points'] | selectattr('name', 'equalto', 'metablock_multi_fill') | list | first }}"
       debug:
         msg: "Fault-injection values for {{ item }}: {{ verifyFI }}"
       no_log: false
       failed_when: >
         (verifyFI['injection_count'] != (num_of_remaining | int)) or
         (verifyFI['num_remaining'] != 0) or
         (verifyFI['cond_exec_count'] != (num_of_remaining | int))
       loop: "{{ get_nisd }}"

    rescue:
     - name: "Recipe: {{ recipe_name }} failed"
       set_fact:
         terminate_recipe: true
