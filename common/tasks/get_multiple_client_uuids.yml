---
    - name: "Get unused client uuid for starting the client."
      include_role:
        name: common
        tasks_from: get_new_uuid
      register: new_uuid

    - name: "Add newly generated client uuid in client_uuids list."
      vars:
         ClientUUIDS: []
      set_fact:
         ClientUUIDS: "{{ ClientUUIDS + [new_uuid.stdout] }}"
