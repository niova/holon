
     - name: "{{ recipe_name }}: Perform some Writes to the NISD."
       vars:
         input_param: {
                 'enable_auth': 0,
                 'cp_mode': 0,
                 'nisd_uuid_to_write': 'unix:{{ NisdUUID }}',
                 'vdev': '{{ VdevUUID }}',
                 'rd_op_ratio': '0',
                 'random_seed_pt': '1010101',
                 'client_uuid': '{{ ClientUUID }}',
                 'request_size_in_bytes': '{{ RequestVblk | string }}',
                 'queue_depth': '{{ item | string }}',
                 'num_ops': '1000',
                 'lookout_uuid':  '{{ LookoutUUID }}',
                 'integrity_check': True,
                 'sequential_writes': False,
                 'blocking_process': False
                 }
       debug:
         msg: "{{ lookup('nisd_handler', 'niova-block-test', input_param) }}"
       no_log: false

     - name: "{{ recipe_name }}: Get vblks-written."
       vars:
         stage: "verify_vblks_written"
         lookout_uuid: "{{ LookoutUUID }}"
         vblks_key:
           - "/nisd_root_entry/0/vblks-written"
       set_fact:
          getVblkAftrItr: "{{ lookup('niova_ctlrequest', 'lookup', NisdUUID, vblks_key, 'nisd', lookout_uuid) | dict2items | map(attribute='value') }}"

     - debug:
         msg: "{{ getVblkAftrItr }}"

     - name: "{{ recipe_name }}: Verifying the VBLKs after Each Iteration."
       vars:
         stage: "verify_vblks"
         nisd_key:
              - "/nisd_root_entry/0/vblks-written"
         lookout_uuid: "{{ LookoutUUID }}"
         getVblkWritten: "{{ lookup('niova_ctlrequest', 'lookup', NisdUUID, nisd_key, 'nisd', lookout_uuid) }}"
       debug:
         msg: "Verify nisd values after writes: {{ getVblkWritten }}, {{ getVblkAftrItr[0] }}"
       no_log: True
       failed_when: getVblkWritten['/0/vblks-written'] != getVblkAftrItr[0]
